<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fazer denuncias</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f4f6f9;
    }

    header {
        background: linear-gradient(to right, #ff9800, #ff5722);
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        justify-content: space-between;
        display: flex;
        align-items: center;
    }

    header a{
        color:white;
        text-decoration:none;
        font-size:20px;
    }

    .container {
        padding: 20px;
        max-width: 500px;
        margin: auto;
    }

    label {
        font-weight: bold;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        margin: 8px 0 15px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    textarea {
        resize: none;
        height: 90px;
    }

    button {
        background-color: #ff5722;
        color: white;
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 25px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #e4622f;
    }

    .sucesso {
        margin-top: 15px;
        padding: 10px;
        background-color: #d4edda;
        color: #155724;
        border-radius: 8px;
        display: none;
        text-align: center;
    }

    .erro {
        margin-top: 15px;
        padding: 10px;
        background-color: #f8d7da;
        color: #721c24;
        border-radius: 8px;
        display: none;
        text-align: center;
    }
</style>
</head>

<body>

<header>
    <div>
        <a href="EDM3.html">⬅</a>
    </div>
    Fazer Denúncias
    <img src="EUNICE-removebg-preview.png" alt="" width="7%">
</header>

<div class="container">

    <label>Nome (opcional)</label>
    <input type="text" id="nome" placeholder="Pode deixar anônimo">

    <label>Bairro</label>
    <input type="text" id="bairro" placeholder="Digite o bairro">

    <label>Tipo de Denúncia</label>
    <select id="tipo">
        <option value="">Selecione</option>
        <option>Burla financeira</option>
        <option>Falso técnico</option>
        <option>Venda ilegal de energia</option>
        <option>Ligação clandestina</option>
        <option>Outro problema local</option>
    </select>

    <label>Descrição do ocorrido</label>
    <textarea id="descricao" placeholder="Explique detalhadamente o que aconteceu"></textarea>

    <button onclick="enviarDenuncia()">Enviar Denúncia</button>

    <div class="sucesso" id="mensagemSucesso">
        ✅ Denúncia enviada com sucesso!
    </div>

    <div class="erro" id="mensagemErro">
        ⚠️ Preencha todos os campos obrigatórios.
    </div>

</div>

<script>
function enviarDenuncia(){

    let nome = document.getElementById("nome").value.trim();
    let bairro = document.getElementById("bairro").value.trim();
    let tipo = document.getElementById("tipo").value;
    let descricao = document.getElementById("descricao").value.trim();

    let sucesso = document.getElementById("mensagemSucesso");
    let erro = document.getElementById("mensagemErro");

    sucesso.style.display = "none";
    erro.style.display = "none";

    // Validação
    if(bairro === "" || tipo === "" || descricao === ""){
        erro.style.display = "block";
        return;
    }

    if(nome === ""){
        nome = "Anônimo";
    }

    // Criar objeto denúncia
    let denuncia = {
        nome: nome,
        bairro: bairro,
        tipo: tipo,
        descricao: descricao,
        status: "PENDENTE",
        data: new Date().toLocaleString()
    };

    // Recuperar denúncias anteriores
    let denuncias = JSON.parse(localStorage.getItem("denunciasEnergia")) || [];

    // Contar ocorrências para alerta
    let contMesmoNome = denuncias.filter(d => d.nome === nome && d.tipo === tipo && d.descricao === descricao).length;
    let contMesmoBairro = denuncias.filter(d => d.bairro === bairro && d.tipo === tipo && d.descricao === descricao).length;
    let contTipoBairros = [...new Set(
        denuncias.filter(d => d.tipo === tipo && d.descricao === descricao).map(d => d.bairro)
    )].length;

    // Se algum critério atingir 3, vira URGENTE
    if(contMesmoNome + 1 >= 3 || contMesmoBairro + 1 >= 3 || contTipoBairros + 1 >= 3){
        denuncia.status = "URGENTE";
    }

    denuncias.push(denuncia);
    localStorage.setItem("denunciasEnergia", JSON.stringify(denuncias));

    sucesso.style.display = "block";

    // Limpar campos
    document.getElementById("nome").value = "";
    document.getElementById("bairro").value = "";
    document.getElementById("tipo").value = "";
    document.getElementById("descricao").value = "";
}
</script>

</body>
</html>
